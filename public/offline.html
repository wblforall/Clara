<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — CLARA</title>
  <link rel="icon" type="image/png" href="assets/clara-logo.png">
  <style>
    :root { --primary: #0D9488; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0D9488, #0891B2); color: #fff; padding: 24px;
    }
    .box { text-align: center; max-width: 360px; }
    img { width: 76px; height: 76px; border-radius: 18px; box-shadow: 0 8px 24px rgba(0,0,0,.2); }
    h1 { font-size: 22px; margin: 22px 0 8px; }
    p { font-size: 14px; line-height: 1.55; opacity: .92; margin: 0 0 22px; }
    button {
      background: #fff; color: var(--primary); border: none; font-weight: 700;
      font-size: 15px; padding: 12px 26px; border-radius: 10px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <img src="assets/icon-192.png" alt="CLARA">
    <h1>Tidak ada koneksi</h1>
    <p>CLARA butuh internet untuk memuat data terbaru. Periksa koneksi Anda lalu coba lagi.</p>
    <button onclick="location.reload()">Coba lagi</button>
  </div>
</body>
</html>
